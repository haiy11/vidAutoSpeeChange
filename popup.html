<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 400px;
      padding: 10px;
    }

    #videoContainer {
      width: 100%;
      margin-bottom: 10px;
    }

    #capturedVideo {
      width: 100%;
      max-height: 300px;
      background: black;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
    }

    #status {
      margin: 10px 0;
      padding: 5px;
      border-radius: 3px;
    }

    .success {
      background-color: #d4edda;
      color: #155724;
    }

    .error {
      background-color: #f8d7da;
      color: #721c24;
    }

    .info {
      background-color: #d1ecf1;
      color: #0c5460;
    }
    
    /* 添加间隔输入样式 */
    .interval-control {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .interval-control label {
      margin-right: 10px;
      font-size: 14px;
    }
    
    .interval-control input {
      flex: 1;
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h3>视频捕获预览</h3>
  <div id="status" class="info">等待初始化...</div>
  
  <!-- 添加间隔时间输入 -->
  <div class="interval-control">
    <label for="intervalInput">捕获间隔(毫秒):</label>
    <input type="number" id="intervalInput" value="200" min="50" max="1000">
  </div>
  
  <div id="videoContainer">
    <video id="capturedVideo" autoplay muted controls></video>
  </div>
  <button id="startCapture">开始捕获</button>
  <button id="stopCapture">停止捕获</button>

  <script src="popup.js"></script>
</body>
</html>
