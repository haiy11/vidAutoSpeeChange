<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 400px;
      padding: 10px;
      overflow: hidden; /* 防止滚动条出现 */
    }

    /* 标签页样式 */
    .tabs {
      display: flex;
      margin-bottom: 10px;
    }
    
    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      background: #e0e0e0;
      cursor: pointer;
      border: 1px solid #ccc;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      margin-right: 2px;
    }
    
    .tab.active {
      background: #007bff;
      color: white;
      font-weight: bold;
    }
    
    .tab-content {
      display: none;
      padding: 10px 0;
      min-height: 220px; /* 固定最小高度 */
      height: 220px; /* 固定高度 */
      overflow: hidden; /* 防止内容溢出 */
    }
    
    .tab-content.active {
      display: block;
    }

  /* 将视频容器改名为更通用的容器 */
  #videoContainer {
    width: 100%;
    height: 200px; /* 固定容器高度 */
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden; /* 防止图片溢出 */
    background-color: #f9f9f9; /* 添加背景色以便区分 */
    border: 1px solid #ddd; /* 添加边框 */
    border-radius: 4px;
  }

  /* 将视频样式改为图片样式 */
  #capturedVideo {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; /* 保持图片比例 */
  }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
    }

    #status {
      margin: 10px 0;
      padding: 5px;
      border-radius: 3px;
    }

    .success {
      background-color: #d4edda;
      color: #155724;
    }

    .error {
      background-color: #f8d7da;
      color: #721c24;
    }

    .info {
      background-color: #d1ecf1;
      color: #0c5460;
    }
    
    /* 添加间隔输入样式 */
    .interval-control {
      display: none; /* 隐藏间隔输入 */
    }
    
    /* 图表容器样式 */
    .chart-container {
      width: 100%;
      height: 200px;
      border: 1px solid #ccc;
      position: relative;
      background: white;
    }
    
    .current-change {
      display: flex;
      justify-content: space-between;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin: 5px 0;
      padding: 5px;
      background: #f9f9f9;
      border-radius: 3px;
    }
    
    .current-change div {
      flex: 1;
    }
    
    .chart-labels {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 10px;
      color: #666;
      background: white; /* 确保背景色 */
      z-index: 1; /* 确保标签在最上层 */
    }
    
    .chart-label {
      text-align: left;
      padding-left: 5px;
    }
    
    .settings-link {
      color: #666;
      cursor: pointer;
      display: inline;
      text-decoration: none;
      font-weight: normal;
      font-size: 1.17em;
    }
    
    .settings-link:hover {
      color: #333;
      text-decoration: none;
    }
    
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="header-container">
    <h3>视频捕获预览</h3>
    <div class="settings-link" id="settingsLink">设置</div>
  </div>
  
  <div id="status" class="info">等待初始化...</div>
  
  <!-- 显示当前变化幅度和播放速度 -->
  <div class="current-change">
    <div id="currentChange">当前变化: --%</div>
    <div id="currentSpeed">当前速度: --x</div>
  </div>
  
  <!-- 添加间隔时间输入（已隐藏） -->
  <div class="interval-control">
    <label for="intervalInput">捕获间隔(毫秒):</label>
    <input type="number" id="intervalInput" value="200" min="50" max="1000">
  </div>
  
  <!-- 标签页 -->
  <div class="tabs">
    <div class="tab active" id="chartTab">变化图表</div>
    <div class="tab" id="videoTab">捕获画面</div>
  </div>
  
  <!-- 标签页内容 -->
  <div class="tab-content active" id="chartContent">
    <div class="chart-container">
      <canvas id="chartCanvas" class="chart-line" width="370" height="200"></canvas>
      <div class="chart-labels">
        <div class="chart-label">100</div>
        <div class="chart-label">80</div>
        <div class="chart-label">60</div>
        <div class="chart-label">40</div>
        <div class="chart-label">20</div>
        <div class="chart-label">0</div>
      </div>
    </div>
  </div>
  
  <div class="tab-content" id="videoContent">
    <div id="videoContainer">
      <img id="capturedVideo" autoplay muted controls></img>
    </div>
  </div>
  
  <button id="startCapture">开始捕获</button>
  <button id="stopCapture">停止捕获</button>

  <script src="popup.js"></script>
</body>
</html>
